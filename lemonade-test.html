<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonade Stand</title>
    <style>
        body {
  background-color: #f4ffdb;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
   margin: 0;
        }
        .container {
  text-align: center;
  background-color: #ffffff;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
  color: #ff6b37;
  font-size: 36px;
        }
        p {
  color: #333333;
  font-size: 18px;
        }
        .button {
  background-color: #ff6b37;
   border: none;
  color: white;
  padding: 15px 30px;
            text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Our Lemonade Stand</h1>
        <p>Refresh your day with a cold glass of homemade lemonade!</p>
        <img src="https://via.placeholder.com/300x200?text=Lemonade" alt="Lemonade">
        <button class="button">Get Your Lemonade Now!</button>
    </div>
</body>
</html>
